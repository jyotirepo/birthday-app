apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: birthday-app-ingress
  namespace: birthday-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: birthday-app.local  # Change to your domain or IP
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
